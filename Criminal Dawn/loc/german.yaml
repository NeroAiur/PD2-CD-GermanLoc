## UNLOCK MENU
crimdawn_new_item1 : "Gage hat das Versteck besucht und etwas neues auf den Tisch gelegt."
crimdawn_new_item2 : "Du hast einen toten Polizisten im letzten Raubüberfall geplündert. Keiner weiß, was er vor hatte, auch du hast aktuell keine Ahnung."
crimdawn_new_item3 : "Während du ins Versteck gefahren bist hast du in deine Beutetasche geschaut, dabei hast du etwas gefunden, mit dem du nicht gerechnet hast..."
crimdawn_new_item4 : "Vlad kam heute etwas früher vorbei um über seine Ziegen zu reden... ausführlich."
crimdawn_new_item5 : "Während du dich auf der Couch ausgeruhen wolltest, hast du etwas unter dem Sofapolster gefunden."
crimdawn_new_item6 : "Den anderen Clowns war langweilig... deshalb haben sie sich entschieden einen Militärtransporter zu überfallen."
crimdawn_new_item7 : "Ein Typ namens Troy kam beim Versteck vorbei. Wir haben ihn zu Jacket geschickt... vorher haben wir aber etwas in seinen Taschen gefunden."
crimdawn_new_item8 : "Ein bärtiger Mann ist dir in deinen Träumen erschienen... Danach bist du neben ihm aufgewacht."
crimdawn_new_item9 : "Eine seltsame Box lag vor der Versteck. Unter ihr war ein Bild von einem Gesicht mit Sonnenbrille und einer Faust. Soll das eine Drohung sein?"
crimdawn_new_item10 : "Locke kramte in seinen Erinnerungen von der Zeit als er in China stationiert war. Dabei hat er etwas in seinen alten Sachen gefunden."
crimdawn_new_item11 : "Wolf starrte dich etwas länger an, als es dir lieb war. Dann gab er dir etwas."
crimdawn_new_item12 : "Bonnie hat etwas gefunden, als sie die Toiletten untersucht hat."
crimdawn_new_item13 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du ein enthusiastisches 'WAHOO'."
crimdawn_new_item14 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du ein elektrisches Knistern."
crimdawn_new_item15 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du wie Gras zerschnitten wird."
crimdawn_new_item16 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du lautes Meeresrauschen"
crimdawn_new_item17 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du stürmische Winde"
crimdawn_new_item18 : "Während du darüber nachgedacht hast, wo all diese Items überhaupt herkommen, öffnete sich ein Portal vor dir. Als du dich diesem näherst hörst du ein hektisches Kreuzfeuer."
crimdawn_new_item19 : "Eine große Schlange schleicht auf dich zu. 'Hey mein Name ist Paul' ist das einzige, was sie sagt bevor sie sagt, bevor sie wieder weiterzieht. Dabei hat sie etwas fallen lassen."
crimdawn_new_item20 : "Als du gerade die neusten Nachrichten über AlmirCorp hörst, bemerkst du, dass Hoxton aufgehört hat die Wand anzustarren und jetzt auf etwas anderes fokussiert ist."
crimdawn_new_item21 : "Houston hat die ganze Nacht damit verbracht, warum der Van nicht mehr gefahren ist. Stellt sich raus, dass etwas im Auspuff steckte."
crimdawn_new_item22 : "Der Zahnarzt hat irgendetwas über mesopotamischen Mist erzählt. Als er fertig war, hat er uns etwas geschenkt."
crimdawn_new_item23 : "Hector hat uns versprochen, dass wir noch bessere Belohnungen erhalten, wenn wir unsere Leben aufs Spiel setzen... Klingt super!"
crimdawn_new_item24 : "Bain ist kurz bei Kung Bo angehalten und hat uns was mitgebracht."
crimdawn_new_item25 : "Der Elephant versucht uns andauernd Öl zu verkaufen. Schade nur, dass uns nur Überfall-Materialien interessieren."

