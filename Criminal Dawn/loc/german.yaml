# Consumable Descriptions
bm_ability_chico_injector_desc: "Press the throwable key to activate. While active, 75% of all damage taken is converted into healing. This effect lasts 6 seconds."
bm_grenade_smoke_screen_grenade_desc: "Grants 50% dodge chance to all crewmates standing inside the cloud, and decreases enemy accuracy by 50% if they enter it. Lasts 10 seconds."
bm_grenade_tag_team_desc: "Press the throwable key while looking at an ally to activate. When you or the tagged ally get a kill, you restore 6 health and the tagged ally restores 3. This effect lasts 12 seconds, but is extended by 1 second per kill."
bm_grenade_pocket_ecm_jammer_desc: "Press the throwable key to activate for 6 seconds. During stealth this will function like a regular ECM, and benefits from any ECM skills you may have. In loud it will instead activate feedback, potentially stunning enemies within 25m."
bm_grenade_copr_ability_desc: "Press the throwable key to activate for 6 seconds. Upon activation you restore 40% of your health, your armor is disabled, and your health is divided into 5 segments. Taking damage causes the crew to recover 5% of their health and removes a segment (two segments if the damage is higher than 200), while killing 2 enemies restores 1 segment. All kills block damage for 1 second."
bm_grenade_damage_control_desc: "Press the throwable key to negate stacked damage."

